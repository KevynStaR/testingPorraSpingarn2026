<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mag:#C2185B;--mag-dark:#880E4F;--mag-light:#F48FB1;--mag-glow:#E91E63;
  --gold:#FFD700;--gold-dark:#F9A825;
  --bg:#0a0a0f;--card:#13131a;--card2:#1a1a24;
  --txt:#f0f0f0;--txt2:#aaa;--txt3:#666;
  --border:rgba(194,24,91,0.25);--border2:rgba(255,255,255,0.08);
  --green:#00E676;--red:#FF1744;--yellow:#FFD600;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.app{max-width:820px;margin:0 auto;padding:0 0 80px}

/* HERO HEADER */
.hero{position:relative;padding:28px 20px 20px;text-align:center;overflow:hidden;border-bottom:1px solid var(--border)}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg svg{width:100%;height:100%;opacity:0.08}
.hero-logo-ring{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--mag),var(--mag-dark));box-shadow:0 0 32px rgba(194,24,91,0.6);margin-bottom:10px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#fff}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5vw,38px);letter-spacing:3px;background:linear-gradient(135deg,#fff 30%,var(--mag-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;line-height:1.1}
.hero p{font-size:12px;color:var(--txt2);margin-top:4px;position:relative;z-index:1;letter-spacing:1px;text-transform:uppercase}
.hero-badges{display:flex;justify-content:center;gap:8px;margin-top:10px;position:relative;z-index:1;flex-wrap:wrap}
.hbadge{font-size:10px;padding:3px 12px;border-radius:20px;border:1px solid;letter-spacing:0.5px;font-weight:600}
.hbadge-mag{border-color:var(--mag);color:var(--mag-light);background:rgba(194,24,91,0.12)}
.hbadge-gold{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08)}

/* NAV TABS */
.nav{display:flex;gap:2px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:8px 16px;border:none;background:transparent;color:var(--txt3);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid transparent}
.nav-btn.active{color:var(--mag-light);border-bottom-color:var(--mag);background:rgba(194,24,91,0.08)}
.nav-btn:hover:not(.active){color:var(--txt);background:rgba(255,255,255,0.04)}

/* LOGIN */
.login-wrap{padding:24px 16px;display:flex;flex-direction:column;gap:16px;align-items:center}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(194,24,91,0.3),transparent 70%);border-radius:50%;pointer-events:none}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:6px;color:var(--mag-light)}
.login-sub{font-size:12px;color:var(--txt2);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.field input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;transition:border 0.2s;outline:none}
.field input:focus{border-color:var(--mag)}
.btn-mag{width:100%;background:linear-gradient(135deg,var(--mag),var(--mag-dark));color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;box-shadow:0 4px 20px rgba(194,24,91,0.35)}
.btn-mag:hover{box-shadow:0 6px 28px rgba(194,24,91,0.55);transform:translateY(-1px)}
.pts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.pts-box{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center}
.pts-num{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px}
.pts-num.green{color:var(--green)}
.pts-num.purple{color:#CE93D8}
.pts-label{font-size:10px;color:var(--txt2);margin-top:2px;line-height:1.3}

/* USER BAR */
.userbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);margin-bottom:2px}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--mag),var(--mag-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 0 12px rgba(194,24,91,0.4)}
.uname{font-weight:700;font-size:13px;flex:1}
.u-pts{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--mag-light);letter-spacing:1px}
.u-pts span{font-family:'Inter',sans-serif;font-size:10px;color:var(--txt2);letter-spacing:0;margin-left:2px}
.logout-btn{background:transparent;border:1px solid var(--border2);color:var(--txt3);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.logout-btn:hover{border-color:var(--mag);color:var(--mag-light)}

/* PROGRESS */
.prog-wrap{padding:10px 16px 0}
.prog-header{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:5px}
.prog-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--mag),var(--mag-light));border-radius:2px;transition:width 0.4s}

/* CONTENT */
.content{padding:12px 16px}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--txt2);margin:16px 0 8px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.phase-title::after{content:'';flex:1;height:1px;background:var(--border)}
.group-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;margin-top:4px}
.g-pill{font-size:10px;font-weight:700;background:linear-gradient(135deg,var(--mag),var(--mag-dark));color:#fff;padding:2px 12px;border-radius:20px;letter-spacing:1px}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:border 0.2s}
.match-card:hover{border-color:var(--border)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team-side{display:flex;align-items:center;gap:8px}
.team-side.right{flex-direction:row-reverse;justify-content:flex-start}
.flag-img{width:32px;height:22px;object-fit:cover;border-radius:3px;border:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.flag-emoji{font-size:22px;line-height:1;flex-shrink:0}
.tname{font-size:12px;font-weight:600;color:var(--txt);line-height:1.2}
.tname.right{text-align:right}
.center-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.result-btns{display:flex;gap:4px}
.rbtn{width:30px;height:26px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--txt2);font-family:'Inter',sans-serif;transition:all 0.15s}
.rbtn:hover{border-color:var(--txt2);color:var(--txt)}
.rbtn.sel-H{background:rgba(0,230,118,0.15);border-color:var(--green);color:var(--green)}
.rbtn.sel-D{background:rgba(255,214,0,0.12);border-color:var(--yellow);color:var(--yellow)}
.rbtn.sel-A{background:rgba(255,23,68,0.12);border-color:var(--red);color:var(--red)}
.locked-banner{
  background:#2a0f16;
  border:1px solid #C2185B;
  color:#F48FB1;
  padding:8px;
  border-radius:8px;
  margin-bottom:10px;
  text-align:center;
  font-size:11px;
  font-weight:700;
}

button:disabled,
input:disabled{
  opacity:.5;
  cursor:not-allowed;
}
.score-wrap{display:flex;align-items:center;gap:4px}
.score-wrap input{width:34px;height:28px;text-align:center;background:var(--bg);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--txt);font-size:13px;font-weight:600;outline:none;font-family:'Inter',sans-serif}
.score-wrap input:focus{border-color:var(--mag)}
.score-sep{font-size:12px;color:var(--txt3)}
.pts-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:0.5px}
.pts-pill.p0{background:rgba(255,255,255,0.05);color:var(--txt3)}
.pts-pill.p2{background:rgba(0,230,118,0.15);color:var(--green)}
.pts-pill.p4{background:linear-gradient(135deg,rgba(194,24,91,0.3),rgba(255,215,0,0.2));color:var(--gold);border:1px solid var(--gold-dark)}
.real-score-badge{background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;font-size:13px;font-weight:700;text-align:center}

/* LEADERBOARD */
.lb-container{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.lb-row{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:10px;transition:all 0.2s}
.lb-row.me{border-color:var(--mag);background:rgba(194,24,91,0.08)}
.lb-row.rank1{border-color:var(--gold);background:rgba(255,215,0,0.05)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center}
.lb-rank.r1{color:var(--gold)}
.lb-rank.r2{color:#C0C0C0}
.lb-rank.r3{color:#CD7F32}
.lb-name-wrap{display:flex;flex-direction:column}
.lb-name{font-weight:700;font-size:13px}
.lb-detail{font-size:10px;color:var(--txt2);margin-top:1px}
.lb-pts{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--mag-light);letter-spacing:1px;text-align:right}
.lb-pts span{font-family:'Inter',sans-serif;font-size:10px;color:var(--txt2)}

/* ADMIN */
.admin-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.admin-row{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2);font-size:12px}
.admin-row:last-child{border-bottom:none}
.ri{display:flex;align-items:center;gap:4px}
.ri input{width:34px;height:28px;text-align:center;background:var(--bg);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--txt);font-size:13px;font-weight:600;outline:none;font-family:'Inter',sans-serif}
.ri input:focus{border-color:var(--mag)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--txt3);flex-shrink:0}
.status-dot.done{background:var(--green)}
.btn-save{background:linear-gradient(135deg,var(--mag),var(--mag-dark));color:#fff;border:none;border-radius:10px;padding:12px 24px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(194,24,91,0.4);transition:all 0.2s;letter-spacing:0.5px}
.btn-save:hover{box-shadow:0 6px 24px rgba(194,24,91,0.6);transform:translateY(-1px)}
.btn-sm2{background:rgba(255,255,255,0.06);color:var(--txt);border:1px solid var(--border2);border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-sm2:hover{background:rgba(255,255,255,0.1)}
.btn-danger{background:rgba(255,23,68,0.12);color:#FF8A80;border:1px solid rgba(255,23,68,0.3);border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--mag),var(--mag-dark));color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 8px 32px rgba(194,24,91,0.5);pointer-events:none;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);font-weight:600;margin-bottom:6px}
.divider{height:1px;background:var(--border);margin:16px 0}

.input-ko{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--txt);font-family:'Inter',sans-serif;font-size:13px;outline:none;margin-top:4px}
.input-ko:focus{border-color:var(--mag)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.tab-content{min-height:400px}
.flag-wrap{position:relative;width:32px;height:22px;flex-shrink:0}
</style>
</head>

function getFlag(name){ return COUNTRY_FLAGS[name]||'⚽'; }
function getInitials(n){ return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function calcResult(h,a){ const hi=parseInt(h),ai=parseInt(a); if(isNaN(hi)||isNaN(ai))return null; return hi>ai?'H':hi<ai?'A':'D'; }

function resolveTeam(name){
  if(ST.koTeams&&ST.koTeams[name]) return ST.koTeams[name];
  return name;
}

function calcPts(uid){
  let pts=0,correct=0,exact=0,preds=0;
  const up=ST.predictions[uid]||{};
  ALL_MATCHES.forEach(m=>{
    const res=ST.results[m.id]; const pred=up[m.id];
    if(pred&&(pred.result||pred.scoreH!==undefined)) preds++;
    if(!res||!pred) return;
    const rr=calcResult(res.h,res.a);
    if(pred.result&&pred.result===rr){pts+=2;correct++;}
    if(pred.scoreH!==undefined&&pred.scoreA!==undefined&&parseInt(pred.scoreH)===parseInt(res.h)&&parseInt(pred.scoreA)===parseInt(res.a)){pts+=2;exact++;}
  });
  return{pts,correct,exact,preds};
}

function calcMatchPts(uid,mid){
  const res=ST.results[mid]; const pred=(ST.predictions[uid]||{})[mid];
  if(!res||!pred) return 0;
  let p=0;
  const rr=calcResult(res.h,res.a);
  if(pred.result&&pred.result===rr) p+=2;
  if(pred.scoreH!==undefined&&pred.scoreA!==undefined&&parseInt(pred.scoreH)===parseInt(res.h)&&parseInt(pred.scoreA)===parseInt(res.a)) p+=2;
  return p;
}

// ---- SYNC TO GOOGLE SHEETS ----
async function syncToSheets(){
  // Build CSV rows
  const rows=[];
  rows.push(['Participante','Partidos Predichos','Resultados Correctos','Marcadores Exactos','Puntos Totales','Posición']);
  const ranked=ST.users.map(u=>({name:u,...calcPts(u)})).sort((a,b)=>b.pts-a.pts);
  ranked.forEach((u,i)=>rows.push([u.name,u.preds,u.correct,u.exact,u.pts,i+1]));
  rows.push([]);
  rows.push(['','','PREDICCIONES DETALLADAS','','','']);
  rows.push(['Partido','Local','Marcador Real','Visitante','Resultado Real']);
  ALL_MATCHES.forEach(m=>{
    const res=ST.results[m.id];
    const hn=resolveTeam(m.home), an=resolveTeam(m.away);
    rows.push([m.id, hn, res?`${res.h}-${res.a}`:'pendiente', an, res?calcResult(res.h,res.a)||'':'-']);
  });
  ST.users.forEach(u=>{
    rows.push([]);
    rows.push([`Predicciones de ${u}`,'Local','Pred Marcador','Visitante','Tipo','Pts']);
    const up=ST.predictions[u]||{};
    ALL_MATCHES.forEach(m=>{
      const pred=up[m.id]; if(!pred) return;
      const hn=resolveTeam(m.home),an=resolveTeam(m.away);
      const score=(pred.scoreH!==undefined&&pred.scoreA!==undefined)?`${pred.scoreH}-${pred.scoreA}`:'';
      rows.push([m.id,hn,score,an,pred.result||'',calcMatchPts(u,m.id)]);
    });
  });
  const csv=rows.map(r=>r.join('\t')).join('\n');
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;
  navigator.clipboard.writeText(csv).then(()=>{
    showToast('📋 Datos copiados — pégalos en tu Google Sheet',4000);
    setTimeout(()=>window.open(url,'_blank'),500);
  }).catch(()=>{
    showToast('📊 Abriendo Google Sheets...',2000);
    window.open(url,'_blank');
  });
}

async function savePreds(){

  if(window.savingPreds){
    showToast('⏳ Ya se está guardando...');
    return;
  }

  window.savingPreds = true;

  const btn = document.getElementById('savePredsBtn');

if(btn){
  btn.disabled = true;
  btn.textContent = '⏳ Guardando...';
}
  
  try{

    const preds = ST.predictions[CU] || {};

    for(const [matchId,p] of Object.entries(preds)){

  const tieneLocal =
    p.scoreH !== '' &&
    p.scoreH !== undefined &&
    p.scoreH !== null;

  const tieneVisitante =
    p.scoreA !== '' &&
    p.scoreA !== undefined &&
    p.scoreA !== null;

  if(tieneLocal !== tieneVisitante){

    showToast(
      '⚠️ Más despacio velocista 😉. Debes completar ambos marcadores antes de guardar'
    );

    window.savingPreds = false;

    if(btn){
      btn.disabled = false;
      btn.textContent = '💾 Guardar mis predicciones';
    }

    return;
  }

}
    
    const payload = {
      action:'savePredictions',
      user:CU,
      predictions:Object.entries(preds).map(([matchId,p])=>({
        matchId,
        result:p.result ?? '',
        scoreH:p.scoreH ?? '',
        scoreA:p.scoreA ?? ''
      }))
    };

    await fetch(API_URL,{
      method:'POST',
      body:JSON.stringify(payload)
    });

    await syncCloudData();

    saveSt(ST);

    showToast('✅ Predicciones guardadas');

  }catch(e){

    console.error(e);

    showToast('❌ Error al guardar predicciones');

  }finally{

    window.savingPreds = false;

    if(btn){
    btn.disabled = false;
    btn.textContent = '💾 Guardar mis predicciones';
  }
    
  }

}

    pm.forEach(m=>{
      const res=ST.results[m.id]||{};
      const hName=resolveTeam(m.home), aName=resolveTeam(m.away);
      const hFlag=getFlag(hName), aFlag=getFlag(aName);
      const row=document.createElement('div'); row.className='admin-row';
      row.innerHTML=`<span style="font-size:12px">${hFlag} ${hName}</span>
        <div class="ri">
          <input type="number" min="0" max="20" value="${res.h!==undefined?res.h:''}" placeholder="–" oninput="setRes('${m.id}','H',this.value)" />
          <span style="color:var(--txt3);font-size:12px">–</span>
          <input type="number" min="0" max="20" value="${res.a!==undefined?res.a:''}" placeholder="–" oninput="setRes('${m.id}','A',this.value)" />
        </div>
        <span style="font-size:12px;text-align:right">${aName} ${aFlag}</span>
        <div class="status-dot${res.h!==undefined?' done':''}"></div>`;
      card.appendChild(row);
    });
    content.appendChild(card);
  });

  // Users management
  const div3=document.createElement('div'); div3.className='divider'; content.appendChild(div3);
  const uLabel=document.createElement('div');
  uLabel.style.cssText='font-family:Bebas Neue,sans-serif;font-size:15px;letter-spacing:2px;color:var(--txt2);margin-bottom:10px';
  uLabel.textContent='GESTIÓN DE PARTICIPANTES';
  content.appendChild(uLabel);
  const uCard=document.createElement('div'); uCard.className='admin-card';
  if(!ST.users.length) uCard.innerHTML='<p style="font-size:12px;color:var(--txt3)">Sin participantes aún.</p>';
  ST.users.forEach(u=>{
    const {pts,correct,exact,preds}=calcPts(u);
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px';
    row.innerHTML=`<div style="flex:1"><b>${u}</b> <span style="color:var(--txt2)">${preds} preds · ${correct} res · ${exact} exact</span></div>
      <span style="color:var(--mag-light);font-weight:700;font-size:14px">${pts}pts</span>
      <button class="btn-danger" onclick="removeUser('${u}')">Eliminar</button>`;
    uCard.appendChild(row);
  });
  content.appendChild(uCard);

  const saveArea=document.createElement('div');
  saveArea.style.cssText='position:sticky;bottom:1rem;display:flex;gap:10px;justify-content:center;padding:12px 0;flex-wrap:wrap';
  saveArea.innerHTML=`<button class="btn-save" onclick="saveAll()">💾 Guardar todo</button>
    <button class="btn-sm2" onclick="doAdminLogout()">Salir del Admin</button>`;
  content.appendChild(saveArea);
}

function setKoTeam(slot,val){ if(!ST.koTeams) ST.koTeams={}; ST.koTeams[slot]=val; saveSt(ST); }
function setRes(mid,side,val){ if(!ST.results[mid]) ST.results[mid]={}; ST.results[mid][side==='H'?'h':'a']=val; saveSt(ST); }

async function saveAll(){

  saveSt(ST);

  const results =
    Object.entries(ST.results)
      .map(([matchId,r])=>({

        matchId,

        h:r.h,

        a:r.a

      }));

  try{

    await fetch(API_URL,{

      method:'POST',

      body:JSON.stringify({

        action:'saveResults',

        results

      })

    });

    showToast('✅ Resultados sincronizados');

  }catch(err){

    console.error(err);

    showToast('❌ Error al sincronizar');

  }

  setTimeout(render,300);

}
function removeUser(name){ if(!confirm('¿Eliminar a '+name+'?')) return; ST.users=ST.users.filter(u=>u!==name); delete ST.predictions[name]; saveSt(ST); render(); }
function doAdminLogout(){ ADMIN=false; sessionStorage.removeItem('sp_admin'); render(); }

function renderAdminLogin(content){
  const card=document.createElement('div');
  card.className='login-card';
  card.style.maxWidth='340px';
  card.style.margin='20px auto';
  card.innerHTML=`<div class="login-title">Acceso Admin</div>
    <div class="login-sub" style="margin-bottom:16px">Solo para el organizador de la polla</div>
    <div class="field"><label>Contraseña</label><input type="password" id="adminPw" placeholder="••••••••" /></div>
    <div id="adminErr" style="display:none;font-size:12px;color:#FF8A80;margin-bottom:10px"></div>
    <button class="btn-mag" onclick="doAdminLogin()">Acceder como Admin</button>`;
  content.appendChild(card);
}

function doAdminLogin(){
  const pw=document.getElementById('adminPw').value;
  if(pw===ST.adminPass||pw===ADMIN_PASS){ ADMIN=true; sessionStorage.setItem('sp_admin','1'); render(); }
  else{ document.getElementById('adminErr').style.display='block'; document.getElementById('adminErr').textContent='Contraseña incorrecta'; }
}

async function syncCloudData(){

  try{

    // Resultados oficiales
    const resultsReq =
      await fetch(API_URL + '?action=loadResults');

    const results =
      await resultsReq.json();

    ST.results = {};

    if(Array.isArray(results)){

      results.slice(1).forEach(r=>{

        ST.results[r[0]] = {
          h:Number(r[1]),
          a:Number(r[2])
        };

      });

    }

    // Participantes
    const usersReq =
      await fetch(API_URL + '?action=loadParticipants');

    const users =
      await usersReq.json();

    if(Array.isArray(users)){

      ST.users =
        users.slice(1)
             .map(r=>r[0])
             .filter(Boolean);

    }
 
    await syncAllPredictions();

    saveSt(ST);

  }catch(err){

    console.error('syncCloudData',err);

  }

const resBlocked = await fetch(
  API_URL + '?action=loadBlockedMatches'
);

ST.blockedMatches =
  await resBlocked.json();
  
}

async function syncAllPredictions(){

  try{

    const req =
      await fetch(
        API_URL +
        '?action=loadAllPredictions'
      );

    const rows = await req.json();

    ST.predictions = {};

    if(Array.isArray(rows)){

      rows.slice(1).forEach(r=>{

        const user = r[0];
        const matchId = r[1];

        if(!user || !matchId) return;

        if(!ST.predictions[user]){
          ST.predictions[user] = {};
        }

        ST.predictions[user][matchId] = {

          result:r[2],

          scoreH:r[3],

          scoreA:r[4]

        };

      });

    }

    saveSt(ST);

  }catch(err){

    console.error(err);

  }

}
  
window.doLogin=doLogin; window.doLogout=doLogout; window.setPredR=setPredR;
window.setPredScore=setPredScore; window.savePreds=savePreds; window.syncToSheets=syncToSheets;
window.setKoTeam=setKoTeam; window.setRes=setRes; window.saveAll=saveAll;
window.removeUser=removeUser; window.doAdminLogin=doAdminLogin; window.doAdminLogout=doAdminLogout;

render();
</script>
</body>
</html>
